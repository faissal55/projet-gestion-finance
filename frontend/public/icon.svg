<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f5f7fa"></rect>

  <!-- Table -->
  <rect x="0" y="250" width="600" height="150" fill="#e0e6ed"></rect>

  <!-- Money stacks -->
  <rect x="80" y="200" width="120" height="40" rx="5" fill="#4CAF50"></rect>
  <rect x="90" y="190" width="120" height="40" rx="5" fill="#66BB6A"></rect>
  <rect x="100" y="180" width="120" height="40" rx="5" fill="#81C784"></rect>

  <!-- Dollar symbol -->
  <text x="140" y="210" font-size="24" fill="white" font-weight="bold">$</text>

  <!-- Calculator -->
  <rect x="350" y="160" width="120" height="160" rx="10" fill="#2c3e50"></rect>
  <rect x="370" y="180" width="80" height="40" fill="#ecf0f1"></rect>

  <!-- Buttons -->
  <g fill="#34495e">
    <rect x="370" y="240" width="20" height="20"></rect>
    <rect x="400" y="240" width="20" height="20"></rect>
    <rect x="430" y="240" width="20" height="20"></rect>

    <rect x="370" y="270" width="20" height="20"></rect>
    <rect x="400" y="270" width="20" height="20"></rect>
    <rect x="430" y="270" width="20" height="20"></rect>
  </g>

  <!-- Hand (simplified) -->
  <ellipse cx="250" cy="220" rx="40" ry="20" fill="#f1c27d"></ellipse>
  <rect x="230" y="200" width="40" height="30" fill="#f1c27d"></rect>

  <!-- Cash machine -->
  <rect x="50" y="120" width="150" height="80" rx="10" fill="#bdc3c7"></rect>
  <rect x="70" y="140" width="110" height="20" fill="#7f8c8d"></rect>

  <!-- Title -->
  <text x="150" y="50" font-size="28" fill="#2c3e50" font-weight="bold">
    Finance &amp; Transactions
  </text>
</svg>